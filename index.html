<!DOCTYPE html>
<html>
<head>
    <title>Workout Timer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
            padding-top: 60px;
            margin: 0;
        }

        h1 {
            font-size: 60px;
            margin-bottom: 10px;
        }

        #status {
            font-size: 28px;
            color: #bbbbbb;
            margin-bottom: 20px;
        }

        #timer {
            font-size: 120px;
            font-weight: bold;
            margin: 30px 0;
        }

        button {
            padding: 15px 35px;
            font-size: 22px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #startBtn {
            background: #28a745;
            color: white;
        }

        #pauseBtn {
            background: #ff9800;
            color: white;
        }
    </style>
</head>

<body>

    <h1 id="exercise">Ready</h1>
    <div id="status">Press Start</div>
    <div id="timer">15</div>

    <button id="startBtn" onclick="startWorkout()">
        Start Workout
    </button>

    <button id="pauseBtn"
            onclick="togglePause()"
            disabled>
        Pause
    </button>

<script>

const exercises = [
    "Jumping Jacks",
    "Wall Sit-up",
    "Push-up",
    "Crunches",
    "Step Up on Chair",
    "Squats",
    "Triceps Dip",
    "Plank",
    "High Jumping",
    "Lunges",
    "Push-up and Rotation",
    "Left Plank",
    "Right Plank",
    "Touch Your Toes"
];

const PREP_TIME = 15;
const EXERCISE_TIME = 30;
const REST_TIME = 10;

let isPaused = false;

const exerciseEl = document.getElementById("exercise");
const statusEl = document.getElementById("status");
const timerEl = document.getElementById("timer");
const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function waitIfPaused() {
    while (isPaused) {
        await sleep(200);
    }
}

function togglePause() {

    isPaused = !isPaused;

    if (isPaused) {
        pauseBtn.innerText = "Resume";
        statusEl.innerText = "Paused";
    } else {
        pauseBtn.innerText = "Pause";
    }
}

function speak(text) {

    return new Promise(resolve => {

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1;
        utterance.pitch = 1;

        utterance.onend = () => resolve();

        speechSynthesis.speak(utterance);

    });

}

async function preparationCountdown(seconds) {

    for(let i = seconds; i >= 1; i--) {

        await waitIfPaused();

        timerEl.innerText = i;

        if(i === 3) await speak("3");
        else if(i === 2) await speak("2");
        else if(i === 1) await speak("1");

        await sleep(1000);
    }
}

async function exerciseStartCountdown() {

    statusEl.innerText = "Get Ready";

    timerEl.innerText = "3";
    await speak("3");

    timerEl.innerText = "2";
    await speak("2");

    timerEl.innerText = "1";
    await speak("1");

    timerEl.innerText = "GO";
    await speak("Start");

    await sleep(500);
}

async function exerciseCountdown() {

    statusEl.innerText = "Exercise";

    for(let i = EXERCISE_TIME; i >= 1; i--) {

        await waitIfPaused();

        timerEl.innerText = i;

        if(i === 15)
            await speak("Halfway");

        if(i === 3)
            await speak("3");

        if(i === 2)
            await speak("2");

        if(i === 1)
            await speak("1");

        await sleep(1000);
    }
}

async function restCountdown() {

    statusEl.innerText = "Rest";

    for(let i = REST_TIME; i >= 1; i--) {

        await waitIfPaused();

        timerEl.innerText = i;

        await sleep(1000);
    }
}

async function startWorkout() {

    startBtn.disabled = true;
    pauseBtn.disabled = false;

    exerciseEl.innerText = "Get Ready";
    statusEl.innerText = "Preparation";

    await speak("Workout starts in 15 seconds");

    await speak("First exercise " + exercises[0]);

    await preparationCountdown(PREP_TIME);

    for(let i = 0; i < exercises.length; i++) {

        exerciseEl.innerText = exercises[i];

        await exerciseStartCountdown();

        await exerciseCountdown();

        if(i < exercises.length - 1) {

            exerciseEl.innerText = "Rest";

            await speak("Rest for 10 seconds");

            await sleep(1000);

            await speak("Next exercise " + exercises[i + 1]);

            await sleep(1000);

            await restCountdown();
        }
    }

    exerciseEl.innerText = "Workout Complete";
    statusEl.innerText = "Finished";
    timerEl.innerText = "✓";

    pauseBtn.disabled = true;

    await speak(
        "Workout complete. Congratulations. You did an amazing job today."
    );
}

</script>

</body>
</html>
